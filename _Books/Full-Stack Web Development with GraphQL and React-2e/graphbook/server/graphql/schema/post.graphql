type Post {
  id: Int
  text: String
  user: User
}
type PostFeed {
  posts: [Post]
}

type Response {
  success: Boolean
}

input PostInput {
  text: String!
}

extend type RootQuery {
  posts: [Post]
  postsFeed(page: Int, limit: Int): PostFeed
}

extend type RootMutation {
  addPost(post: PostInput!): Post
  deletePost(postId: Int!): Response
}
